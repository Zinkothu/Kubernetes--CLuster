apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
  - port: 9002
    targetPort: 9002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dashboard
  name: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      annotations:
        # 'consul.hashicorp.com/connect-inject': 'true'
        # 'consul.hashicorp.com/transparent-proxy': 'false'
        # # 'consul.hashicorp.com/connect-service-upstreams': 'counting.svc.jpdc.peer:9001'
        # 'consul.hashicorp.com/connect-service-upstreams': 'counting.svc.default.ns.jpdc-default.peer:9001' #jpdc will not work, use jpdc-default
        # # 'consul.hashicorp.com/connect-service-upstreams': 'counting:9001'
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard
      containers:
      - name: dashboard
        image: hashicorp/dashboard-service:0.0.4
        ports:
        - containerPort: 9002
        env:
        - name: COUNTING_SERVICE_URL
          value: 'http://counting.default.svc.cluster.local:9001'
        #   # value: 'http://counting.virtual.jpdc.consul'
        #   # value: 'http://counting.virtual.sgdc-default.consul'
        #   # value: 'http://counting:9001'
        #   # value: 'counting.svc.default.ns.sgdc-default.peer:9001'
          # value: "http://counting.virtual.default.jpdc-default.consul" # <service>.virtual[.<namespace>].<peer>.<domain>